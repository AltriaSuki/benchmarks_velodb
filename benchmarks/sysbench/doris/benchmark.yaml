# Doris Sysbench Benchmark Configuration

engine:
  type: "doris" # Engine type
  connection:
    fe_host: "${FE_HOST:-127.0.0.1}" # Doris Frontend host
    fe_http_port: "${FE_HTTP_PORT:-8030}" # HTTP port for Doris Frontend
    fe_query_port: "${FE_QUERY_PORT:-9535}" # Query port for Doris Frontend
    user: "${USER:-root}" # Doris username
    password: "${PASSWORD:-}" # Doris password
    db: "${DB:-sysbench}" # Doris database name

parameters:
  load: "${LOAD:-false}" # Whether to run data loading phase
  query: "${QUERY:-false}" # Whether to run benchmark query
  session: "${SESSION:-false}" # Whether to run session setup phase
  analyze: "${ANALYZE:-false}" # Whether to run analyze phase
  drop_database: "${DROP_DATABASE:-false}"

sysbench:
  enabled: true
  test_name: "${SYSBENCH_TEST_NAME:-oltp_read_only}"
  tables: "${SYSBENCH_TABLES:-8}"
  table_size: "${SYSBENCH_TABLE_SIZE:-30000000}"
  threads: "${SYSBENCH_THREADS:-32}"
  time: "${SYSBENCH_TIME:-300}"
  report_interval: "${SYSBENCH_REPORT_INTERVAL:-1}"
  run: "${SYSBENCH_RUN:-true}"
  cleanup: "${SYSBENCH_CLEANUP:-false}"

paths:
  ddl: "ddl/ddl.sql" # DDL setup file
  session_file: "${SESSION_FILE:-session/session.sql}" # Session setup file
  analyze_file: "${ANALYZE_FILE:-analyze/analyze_sample.sql}" # Analyze statistics file
  load_dir: "load/load_s3/" # Directory containing data loading SQL files

tables:
  sbtest1: 30000000
  sbtest2: 30000000
  sbtest3: 30000000
  sbtest4: 30000000
  sbtest5: 30000000
  sbtest6: 30000000
  sbtest7: 30000000
  sbtest8: 30000000

storage:
  endpoint: "${STORAGE_ENDPOINT:-oss-cn-beijing-internal.aliyuncs.com}"
  region: "${STORAGE_REGION:-oss-cn-beijing-internal}"
  bucket: "${STORAGE_BUCKET:-qa-build}"
  access_key: "${STORAGE_ACCESS_KEY:-}"
  secret_key: "${STORAGE_SECRET_KEY:-}"
